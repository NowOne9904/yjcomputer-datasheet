<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영재컴퓨터 PC 성능 가이드</title>
  <style>
    :root {
      --bg:       #f5f6f8;
      --white:    #ffffff;
      --card:     #ffffff;
      --card2:    #f9fafb;
      --hover:    #f0f4ff;
      --bdr:      #e5e7eb;
      --bdrL:     #d1d5db;
      --t1:       #111827;
      --t2:       #4b5563;
      --t3:       #9ca3af;
      --primary:  #3b52e4;
      --primaryL: #6474f0;
      --primaryBg:#eef0fd;
      --emerald:  #059669;
      --emeraldBg:#ecfdf5;
      --amber:    #d97706;
      --amberBg:  #fffbeb;
      --rose:     #e11d48;
      --roseBg:   #fff1f2;
      --sky:      #0284c7;
      --skyBg:    #f0f9ff;
      --purple:   #7c3aed;
      --purpleBg: #f5f3ff;
      --kakao:    #fee500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }
    .wrap { max-width: 100%; margin: 0 auto; padding: 14px 16px 36px; }

    /* ── Loading / Error ── */
    .center {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 56px 20px; gap: 12px; color: var(--t3);
    }
    .loader {
      width: 28px; height: 28px;
      border: 3px solid var(--bdr);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Info section header ── */
    .info-head { padding: 16px 16px 14px; }
    .info-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 12px;
    }
    .section-divider { height: 1px; background: var(--bdr); margin: 0 16px; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px;
      background: var(--white);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .brand { font-size: 10px; color: var(--t3); letter-spacing: .06em; font-weight: 500; }
    .pagetitle { font-size: 14px; font-weight: 700; color: var(--t1); }
    .live { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--t3); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Hero ── */
    .hero {
      background: var(--white);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .hero-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 12px;
    }
    .hero-title { font-size: 13.5px; font-weight: 700; flex: 1; line-height: 1.5; color: var(--t1); }
    .hero-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; white-space: nowrap;
      border: 1px solid;
    }
    .bt60  { background:#f3f4f6;            color:#6b7280; border-color:#d1d5db; }
    .bt100 { background:var(--emeraldBg);   color:var(--emerald); border-color:#a7f3d0; }
    .bt120 { background:var(--primaryBg);   color:var(--primary); border-color:#c7d2fe; }
    .bt140 { background:var(--amberBg);     color:var(--amber);   border-color:#fde68a; }
    .bt160 { background:var(--purpleBg);    color:var(--purple);  border-color:#ddd6fe; }
    .bsold { background:var(--roseBg);      color:var(--rose);    border-color:#fecdd3; }
    .bprice{ background:var(--skyBg);       color:var(--sky);     border-color:#bae6fd; font-size:11px; }

    .hero-specs { display: flex; flex-direction: column; gap: 5px; }
    .sr { display: flex; gap: 8px; align-items: baseline; }
    .sk { font-size: 10px; color: var(--t3); font-weight: 600; width: 30px; flex-shrink: 0; letter-spacing:.03em; }
    .sv { font-size: 12px; color: var(--t2); flex: 1; }
    .sv.hl { color: var(--t1); font-weight: 500; }

    /* ── Section card ── */
    .section {
      background: var(--white);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .sec-head {
      padding: 13px 16px 0;
      font-size: 12px; font-weight: 700; color: var(--t1);
      display: flex; align-items: center; gap: 6px;
    }
    .sec-sub { font-size: 10px; color: var(--t3); font-weight: 400; margin-left: 2px; }

    /* ── Resolution ── */
    .res-row { display: flex; gap: 7px; padding: 10px 16px 14px; flex-wrap: wrap; }
    .rbadge {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 14px; border-radius: 10px;
      font-size: 11px; font-weight: 700; border: 1px solid;
      min-width: 76px;
    }
    .rlabel { font-size: 10px; font-weight: 400; opacity: .7; margin-bottom: 1px; }
    .rok  { background:var(--emeraldBg); color:var(--emerald); border-color:#a7f3d0; }
    .rmid { background:var(--primaryBg); color:var(--primary); border-color:#c7d2fe; }
    .rlo  { background:var(--amberBg);   color:var(--amber);   border-color:#fde68a; }
    .rno  { background:#f9fafb;          color:var(--t3);      border-color:var(--bdr); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 5px; padding: 10px 16px; flex-wrap: wrap; border-bottom: 1px solid var(--bdr); }
    .tab {
      padding: 5px 13px; border-radius: 7px;
      border: 1px solid var(--bdrL); background: transparent;
      color: var(--t2); cursor: pointer; font-size: 11px; font-weight: 600;
      transition: all .12s;
    }
    .tab:hover { background: var(--hover); border-color: var(--primary); color: var(--primary); }
    .tab.on { background: var(--primaryBg); border-color: var(--primary); color: var(--primary); }

    /* ── Game grid ── */
    .ggrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px 16px 16px; }
    @media (max-width:400px) { .ggrid { grid-template-columns: 1fr; } }
    .gitem {
      background: var(--card2); border: 1px solid var(--bdr);
      border-radius: 9px; padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .gname { font-size: 11.5px; color: var(--t2); flex: 1; font-weight: 500; }
    .gfps  { font-size: 15px; font-weight: 800; }
    .gfps .unit { font-size: 9px; font-weight: 400; color: var(--t3); }
    .fps-hi  { color: var(--emerald); }
    .fps-mid { color: var(--sky); }
    .fps-lo  { color: var(--amber); }
    .fps-xlo { color: var(--rose); }
    .gbar { width: 42px; height: 5px; background: var(--bdr); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
    .gfill { height: 100%; border-radius: 99px; }

    /* ── Work grid ── */
    .wgrid { display: flex; flex-direction: column; gap: 6px; padding: 12px 16px 16px; }
    .witem {
      background: var(--card2); border: 1px solid var(--bdr);
      border-radius: 9px; padding: 10px 13px;
      display: flex; align-items: center; gap: 11px;
    }
    .wico  { font-size: 18px; flex-shrink: 0; }
    .wbody { flex: 1; }
    .wname { font-size: 12px; font-weight: 600; color: var(--t1); }
    .wdesc { font-size: 10.5px; color: var(--t2); margin-top: 2px; }
    .wlv { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; flex-shrink: 0; border: 1px solid; }
    .lv-ok  { background:var(--emeraldBg); color:var(--emerald); border-color:#a7f3d0; }
    .lv-mid { background:var(--primaryBg); color:var(--primary); border-color:#c7d2fe; }
    .lv-lo  { background:var(--amberBg);   color:var(--amber);   border-color:#fde68a; }
    .lv-no  { background:#f9fafb;          color:var(--t3);      border-color:var(--bdr); }

    /* ── Compare ── */
    .cmp-cols {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; padding: 12px 16px 16px;
      align-items: stretch;
    }
    @media (max-width:520px) { .cmp-cols { grid-template-columns: 1fr; } }
    .ccol {
      background: var(--card2); border: 1px solid var(--bdr); border-radius: 10px; padding: 11px;
      display: flex; flex-direction: column;
    }
    .clabel {
      font-size: 10.5px; font-weight: 700; margin-bottom: 9px;
      display: flex; align-items: center; gap: 4px; color: var(--t1);
      flex-shrink: 0;
    }
    .clabel .sub { font-size: 10px; font-weight: 400; color: var(--t3); }
    .citem {
      background: var(--white); border: 1px solid var(--bdr);
      border-radius: 8px; padding: 9px 10px;
      text-decoration: none; display: flex; flex-direction: column;
      transition: all .12s; cursor: pointer; flex: 1;
    }
    .citem:hover { border-color: var(--primary); background: var(--hover); }
    .cthumb-wrap {
      width: 100%; aspect-ratio: 1/1; border-radius: 6px;
      overflow: hidden; background: #f3f4f6;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cthumb {
      width: 100%; height: 100%; object-fit: contain;
      transition: transform .2s;
      image-rendering: -webkit-optimize-contrast;
    }
    .citem:hover .cthumb { transform: scale(1.04); }
    .cthumb-fallback {
      font-size: 28px; color: var(--t3);
    }
    .ctl  { font-size: 11px; font-weight: 600; color: var(--t1); line-height: 1.4; margin-bottom: 4px; }
    .csp  { font-size: 10px; color: var(--t3); line-height: 1.5; }
    .cpri { font-size: 10px; color: var(--sky); font-weight: 700; margin-top: 4px; }
    .citem-spacer { flex: 1; }
    .clnk {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      width: 100%; padding: 6px 8px; margin-top: 7px;
      background: var(--primary); color: #fff;
      border-radius: 6px; font-size: 10.5px; font-weight: 700;
      text-decoration: none; transition: background .12s;
    }
    .clnk:hover { background: var(--primaryL); }
    .cempty {
      font-size: 10.5px; color: var(--t3); text-align: center;
      padding: 14px 0; flex: 1; display: flex; align-items: center; justify-content: center;
    }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--bdr); margin: 0 16px; }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--white);
      border: 1px solid var(--bdr); border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .ftxt { font-size: 10px; color: var(--t3); }
    .kakaobtn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; background: var(--kakao); color: #3c1e1e;
      border-radius: 7px; font-size: 11px; font-weight: 700;
      text-decoration: none; transition: opacity .12s;
    }
    .kakaobtn:hover { opacity: .88; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bdrL); border-radius: 99px; }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="center" id="loading">
    <div class="loader"></div>
    <span style="font-size:12px;color:#9ca3af">성능 데이터 불러오는 중...</span>
  </div>
</div>

<script>
const SB_URL = 'https://kaewzfjssmcxeofgezww.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthZXd6Zmpzc21jeGVvZmdlend3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTU2OTYsImV4cCI6MjA4OTc5MTY5Nn0.yXKZmS7I-6PcsEKLoW3-esytSg_49MkCNM3nxULn0j8';
const SHOP   = 'https://www.youngjaecomputer.com/shop/item.php?it_id=';

const PERF_META = {
  60:  { label:'입문급',  cls:'bt60',  emoji:'🟤' },
  100: { label:'일반',    cls:'bt100', emoji:'🟢' },
  120: { label:'중급',    cls:'bt120', emoji:'🔵' },
  140: { label:'고급',    cls:'bt140', emoji:'🟡' },
  160: { label:'최고급',  cls:'bt160', emoji:'🟣' },
};
const PERF_ORDER = [60, 100, 120, 140, 160];

const RES = {
  60:  { fhd:'ok',  qhd:'no',  k4:'no'  },
  100: { fhd:'ok',  qhd:'mid', k4:'no'  },
  120: { fhd:'ok',  qhd:'ok',  k4:'lo'  },
  140: { fhd:'ok',  qhd:'ok',  k4:'mid' },
  160: { fhd:'ok',  qhd:'ok',  k4:'ok'  },
};
const RES_TEXT = { ok:'최적',    mid:'가능',    lo:'제한적',  no:'비추천' };
const RES_ICON = { ok:'✅',      mid:'🟡',      lo:'⚠️',      no:'✖' };
const RES_CLS  = { ok:'rok',     mid:'rmid',    lo:'rlo',     no:'rno' };

const GAME_CATS = {
  fps: {
    tab: '🎯 FPS 게임',
    items: [
      { name:'발로란트',      fps:{ 60:130, 100:240, 120:350, 140:480, 160:600 }, max:650 },
      { name:'배틀그라운드',  fps:{ 60:55,  100:100, 120:145, 140:185, 160:235 }, max:260 },
      { name:'오버워치 2',    fps:{ 60:80,  100:144, 120:200, 140:260, 160:320 }, max:360 },
      { name:'사이버펑크 2077', fps:{ 60:35,  100:60,  120:85,  140:115, 160:150 }, max:170 },
    ],
  },
  rpg: {
    tab: '⚔️ RPG·MMORPG',
    items: [
      { name:'로스트아크',    fps:{ 60:55,  100:90,  120:110, 140:135, 160:160 }, max:180 },
      { name:'디아블로 4',    fps:{ 60:40,  100:70,  120:100, 140:130, 160:160 }, max:180 },
      { name:'붉은사막',      fps:{ 60:25,  100:55,  120:80,  140:110, 160:140 }, max:160 },
      { name:'아이온 2',      fps:{ 60:40,  100:70,  120:100, 140:125, 160:155 }, max:175 },
    ],
  },
  lol: {
    tab: '⚡ LoL 계열',
    items: [
      { name:'리그오브레전드', fps:{ 60:144, 100:200, 120:300, 140:400, 160:500 }, max:560 },
      { name:'TFT',            fps:{ 60:60,  100:120, 120:144, 140:144, 160:144 }, max:160 },
      { name:'2XKO',           fps:{ 60:60,  100:100, 120:144, 140:180, 160:240 }, max:270 },
      { name:'와일드리프트',   fps:{ 60:60,  100:120, 120:144, 140:144, 160:144 }, max:160 },
    ],
  },
};

// work_performance 데이터 - Supabase에서 로드
let WORK_CATS = { video: {}, office: {}, modeling: {} };

async function loadWorkPerf() {
  try {
    const h = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
    const res = await fetch(`${SB_URL}/rest/v1/work_performance?select=*&order=tier.asc,sort_order.asc`, { headers: h });
    if (!res.ok) return;
    const rows = await res.json();
    const tmp = { video: {}, office: {}, modeling: {} };
    rows.forEach(r => {
      if (!tmp[r.category]) return;
      if (!tmp[r.category][r.tier]) tmp[r.category][r.tier] = [];
      tmp[r.category][r.tier].push({ i: r.icon, n: r.name, d: r.description, lv: r.level });
    });
    WORK_CATS = tmp;
  } catch (e) { /* fallback: 빈 배열 유지 */ }
}

let activeTab = 'fps';

function getParam(k) { return new URLSearchParams(window.location.search).get(k); }
function priceFmt(p) { if (!p || p < 10000) return null; return Math.round(p / 10000) + '만원'; }
function shorten(s, n = 44) {
  if (!s) return '-';
  s = s.replace(/\s*\(.*?\)/g, '').trim();
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}
function fpsColor(v, max) {
  const r = v / max;
  return r >= .65 ? 'fps-hi' : r >= .38 ? 'fps-mid' : r >= .18 ? 'fps-lo' : 'fps-xlo';
}
function fpsBarColor(r) {
  return r >= .65 ? '#059669' : r >= .38 ? '#0284c7' : r >= .18 ? '#d97706' : '#e11d48';
}
function fpsDisplay(v) { return v >= 500 ? '500+' : String(v); }

// ── Render ──
const WORK_KEYS = ['video', 'office', 'modeling'];
const LV_LABEL  = { ok:'원활', mid:'가능', lo:'제한', no:'비추' };

function renderGameGrid(perf) {
  if (WORK_KEYS.includes(activeTab)) {
    const cat   = WORK_CATS[activeTab];
    const items = cat[perf] || cat[100];
    return `<div class="wgrid">${items.map(w => `
      <div class="witem">
        <span class="wico">${w.i}</span>
        <div class="wbody">
          <div class="wname">${w.n}</div>
          <div class="wdesc">${w.d}</div>
        </div>
        <span class="wlv lv-${w.lv}">${LV_LABEL[w.lv]}</span>
      </div>`).join('')}
    </div>`;
  }
  const cat = GAME_CATS[activeTab];
  if (!cat) return '';
  return `<div class="ggrid">${cat.items.map(g => {
    const v   = g.fps[perf] || 0;
    const pct = Math.min(100, Math.round(v / g.max * 100));
    return `<div class="gitem">
      <span class="gname">${g.name}</span>
      <span class="gfps ${fpsColor(v, g.max)}">${fpsDisplay(v)}<span class="unit"> fps</span></span>
      <div class="gbar"><div class="gfill" style="width:${pct}%;background:${fpsBarColor(pct/100)}"></div></div>
    </div>`;
  }).join('')}</div>`;
}

function renderInfoSection(p) {
  const meta  = PERF_META[p.performance] || {};
  const price = priceFmt(p.it_price);
  const r     = RES[p.performance] || RES[100];
  const tabs  = [
    { key:'fps',      label:'🎯 FPS 게임' },
    { key:'rpg',      label:'⚔️ RPG·MMORPG' },
    { key:'lol',      label:'⚡ LoL 계열' },
    { key:'video',    label:'🎬 영상편집' },
    { key:'office',   label:'💼 사무용' },
    { key:'modeling', label:'🏗️ 3D 모델링' },
  ];
  return `
  <div class="section" id="perf-section">
    <div class="info-head">
      <div class="info-title-row">
        <div class="hero-title">${p.title}</div>
        <div class="hero-badges">
          <span class="badge ${meta.cls}">${meta.emoji} ${meta.label}</span>
          ${p.is_soldout ? '<span class="badge bsold">품절</span>' : ''}
          ${price ? `<span class="badge bprice">${price}</span>` : ''}
        </div>
      </div>
      <div class="hero-specs">
        <div class="sr"><span class="sk">CPU</span><span class="sv hl">${shorten(p.cpu)}</span></div>
        <div class="sr"><span class="sk">RAM</span><span class="sv">${shorten(p.ram)}</span></div>
        <div class="sr"><span class="sk">GPU</span><span class="sv hl">${shorten(p.gpu)}</span></div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="sec-head" style="padding-top:13px">🖥️ 추천 해상도</div>
    <div class="res-row">
      <div class="rbadge ${RES_CLS[r.fhd]}">
        <span class="rlabel">FHD · 1080p</span>
        ${RES_ICON[r.fhd]} ${RES_TEXT[r.fhd]}
      </div>
      <div class="rbadge ${RES_CLS[r.qhd]}">
        <span class="rlabel">QHD · 1440p</span>
        ${RES_ICON[r.qhd]} ${RES_TEXT[r.qhd]}
      </div>
      <div class="rbadge ${RES_CLS[r.k4]}">
        <span class="rlabel">4K · 2160p</span>
        ${RES_ICON[r.k4]} ${RES_TEXT[r.k4]}
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="sec-head" style="padding-top:13px">📊 게임·작업 성능 가이드 <span class="sec-sub">FHD 기준 예상 수치</span></div>
    <div class="tabs">
      ${tabs.map(t => `<button class="tab${activeTab===t.key?' on':''}" onclick="switchTab('${t.key}',${p.performance})">${t.label}</button>`).join('')}
    </div>
    <div id="game-grid">${renderGameGrid(p.performance)}</div>
  </div>`;
}

const THUMB = 'https://admin.youngjaecomputer.com/data/item/';

function renderCompItem(p) {
  const price  = priceFmt(p.it_price);
  const imgSrc = `${THUMB}${p.it_id}_l`;
  return `
  <a class="citem" href="${SHOP + p.it_id}" target="_blank">
    <div class="cthumb-wrap">
      <img class="cthumb" src="${imgSrc}" alt="${p.title}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="cthumb-fallback" style="display:none">🖥️</div>
    </div>
    <div class="ctl">${p.title}</div>
    <div class="csp">CPU: ${shorten(p.cpu, 36)}</div>
    <div class="csp">GPU: ${shorten(p.gpu, 36)}</div>
    ${price ? `<div class="cpri">≈ ${price}</div>` : ''}
    <div class="citem-spacer"></div>
    <span class="clnk">이 제품 보러가기</span>
  </a>`;
}

// GPU 칩셋 추출 (RTX 4070, RX 7600 등 핵심 모델명)
function gpuChip(str) {
  if (!str) return '';
  const m = str.match(/(RTX\s*\d+\w*|RX\s*\d+\w*|GTX\s*\d+\w*|Arc\s*\w+)/i);
  return m ? m[0].replace(/\s+/g, '').toLowerCase() : str.slice(0, 10).toLowerCase();
}
// CPU 브랜드 추출 (AMD / Intel)
function cpuBrand(str) {
  if (!str) return '';
  if (/AMD|라이젠/i.test(str))   return 'amd';
  if (/인텔|Intel|코어i/i.test(str)) return 'intel';
  return '';
}

function renderCompare(product, all) {
  const idx    = PERF_ORDER.indexOf(product.performance);
  const upP    = PERF_ORDER[idx + 1];
  const loP    = PERF_ORDER[idx - 1];
  const curGpu = gpuChip(product.gpu);
  const curCpu = cpuBrand(product.cpu);

  const samePool = all.filter(p => p.id !== product.id && p.performance === product.performance && !p.is_soldout);
  // 다른 GPU 칩셋 우선, 없으면 다른 CPU 브랜드, 없으면 그냥 첫 번째
  const same = (
    samePool.filter(p => gpuChip(p.gpu) !== curGpu).slice(0, 1).length
      ? samePool.filter(p => gpuChip(p.gpu) !== curGpu).slice(0, 1)
      : samePool.filter(p => cpuBrand(p.cpu) !== curCpu).slice(0, 1).length
        ? samePool.filter(p => cpuBrand(p.cpu) !== curCpu).slice(0, 1)
        : samePool.slice(0, 1)
  );

  // 상급: 같은 CPU 브랜드 우선, 없으면 첫 번째
  const upperPool = upP ? all.filter(p => p.performance === upP && !p.is_soldout) : [];
  const upper = upperPool.filter(p => cpuBrand(p.cpu) === curCpu).slice(0, 1).length
    ? upperPool.filter(p => cpuBrand(p.cpu) === curCpu).slice(0, 1)
    : upperPool.slice(0, 1);

  // 가성비: 같은 CPU 브랜드 우선, 없으면 첫 번째
  const lowerPool = loP ? all.filter(p => p.performance === loP && !p.is_soldout) : [];
  const lower = lowerPool.filter(p => cpuBrand(p.cpu) === curCpu).slice(0, 1).length
    ? lowerPool.filter(p => cpuBrand(p.cpu) === curCpu).slice(0, 1)
    : lowerPool.slice(0, 1);
  const upMeta = upP ? PERF_META[upP] : null;
  const loMeta = loP ? PERF_META[loP] : null;

  return `
  <div class="section">
    <div class="sec-head">🔄 사양 비교 추천</div>
    <div class="cmp-cols">
      <div class="ccol">
        <div class="clabel">🔄 동일 사양 대안</div>
        ${same.length ? same.map(renderCompItem).join('') : '<div class="cempty">동일 사양<br>제품 없음</div>'}
      </div>
      <div class="ccol">
        <div class="clabel">⬆️ 상급 제품 <span class="sub">${upMeta ? upMeta.label : ''}</span></div>
        ${upper.length ? upper.map(renderCompItem).join('') : '<div class="cempty">최고 사양<br>입니다</div>'}
      </div>
      <div class="ccol">
        <div class="clabel">💰 가성비 제품 <span class="sub">${loMeta ? loMeta.label : ''}</span></div>
        ${lower.length ? lower.map(renderCompItem).join('') : '<div class="cempty">최저 사양<br>입니다</div>'}
      </div>
    </div>
  </div>`;
}

function renderPage(product, all) {
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div>
        <div class="brand">YOUNGJAE COMPUTER</div>
        <div class="pagetitle">PC 성능 가이드</div>
      </div>
      <div class="live"><span class="dot"></span>실시간 연동</div>
    </div>
    ${renderInfoSection(product)}
    ${renderCompare(product, all)}
    <div class="footer">
      <span class="ftxt">© 영재컴퓨터 · 데이터 실시간 연동</span>
      <a class="kakaobtn" href="http://pf.kakao.com/_sxmjxgT/chat" target="_blank">💬 카카오톡 상담</a>
    </div>`;
}

function switchTab(key, perf) {
  activeTab = key;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.toggle('on', b.getAttribute('onclick').includes(`'${key}'`));
  });
  document.getElementById('game-grid').innerHTML = renderGameGrid(perf);
  sendHeight();
}

function sendHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage({ type: 'yjHeight', height: h }, '*');
}

// 높이 변화 감지 (탭 전환, 이미지 로드 등)
const _ro = new ResizeObserver(() => sendHeight());
_ro.observe(document.body);

(async () => {
  const itId = getParam('it_id');
  if (!itId) {
    document.getElementById('app').innerHTML = `
      <div class="center">
        <div style="font-size:30px">🔍</div>
        <div style="font-size:13px;color:#374151">제품을 찾을 수 없습니다</div>
        <div style="font-size:11px;color:#9ca3af">URL에 <code style="color:#3b52e4">?it_id=제품코드</code> 를 추가해주세요</div>
      </div>`;
    return;
  }
  try {
    const h = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
    const [pRes, aRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/pc_products?it_id=eq.${itId}&select=*`, { headers: h }),
      fetch(`${SB_URL}/rest/v1/pc_products?select=*&order=performance.asc,it_price.asc`, { headers: h }),
      loadWorkPerf(),
    ]);
    if (!pRes.ok || !aRes.ok) throw new Error('데이터 로드 실패');
    const [products, all] = await Promise.all([pRes.json(), aRes.json()]);
    if (!products.length) {
      document.getElementById('app').innerHTML = `
        <div class="center">
          <div style="font-size:26px">😥</div>
          <div style="color:#374151">제품 코드 <b>${itId}</b>를 찾을 수 없습니다</div>
        </div>`;
      return;
    }
    renderPage(products[0], all);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="center">
        <div style="font-size:26px">⚠️</div>
        <div style="color:#e11d48">${err.message}</div>
      </div>`;
  }
})();
</script>
